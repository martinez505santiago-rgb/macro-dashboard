<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Macro Definitiva</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; margin: 0; padding: 10px; }
        .container { width: 98%; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .row { display: grid; grid-template-columns: 1fr 450px; gap: 15px; }
        .box { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 15px; }
        h2 { color: #58a6ff; font-size: 14px; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 5px; }
        h1 { text-align: center; font-weight: 300; color: #f0f6fc; margin: 10px 0; }
    </style>
</head>
<body>

    <h1>TERMINAL GLOBAL MACRO - DATOS EN VIVO</h1>

    <div class="container">
        
        <!-- SECCIÓN 1: SENTIMIENTO Y NOTICIAS -->
        <div class="row">
            <div class="box">
                <h2>Fortaleza de Divisas (Heatmap)</h2>
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-forex-heat-map.js" async>
                    {
                      "width": "100%",
                      "height": "400",
                      "currencies": ["EUR", "USD", "JPY", "GBP", "CHF", "AUD", "CAD", "NZD"],
                      "colorTheme": "dark",
                      "locale": "es"
                    }
                    </script>
                </div>
            </div>

            <div class="box">
                <h2>Calendario de Alto Impacto (NFP/Tasas)</h2>
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                    {
                      "colorTheme": "dark",
                      "width": "100%",
                      "height": "400",
                      "locale": "es",
                      "importanceFilter": "1",
                      "currencyFilter": "USD,EUR,JPY,GBP,AUD,CAD,CHF,NZD"
                    }
                    </script>
                </div>
            </div>
        </div>

        <!-- SECCIÓN 2: EL DASHBOARD DE DATOS (ESTE NO FALLA) -->
        <div class="box">
            <h2>Indicadores Económicos: PIB, Desempleo, Tasas y PMI</h2>
            <div class="tradingview-widget-container">
                <!-- Usamos el Economic Calendar Widget configurado como tabla de datos -->
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                {
                  "colorTheme": "dark",
                  "isMaximized": true,
                  "width": "100%",
                  "height": "1000",
                  "locale": "es",
                  "importanceFilter": "1",
                  "currencyFilter": "USD,EUR,JPY,GBP,AUD,CAD,CHF,NZD",
                  "eventFilter": "10,20,30,40,50,60" 
                }
                </script>
            </div>
        </div>
    </div>

</body>
</html>

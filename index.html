<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Macro Global</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d1117; color: white; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .grid-main { display: grid; grid-template-columns: 1fr 450px; gap: 20px; }
        .box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        h2 { color: #58a6ff; font-size: 14px; text-transform: uppercase; margin-top: 0; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-bottom: 15px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <h1 style="text-align: center; font-weight: 300; margin-bottom: 30px;">GLOBAL MACRO TERMINAL</h1>

    <div class="container">
        
        <!-- 1. SENTIMIENTO (MAPA DE CALOR) -->
        <div class="box">
            <h2>Sentimiento de Mercado (Fortaleza de Divisas)</h2>
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-forex-heat-map.js" async>
                {
                  "width": "100%",
                  "height": "400",
                  "currencies": ["EUR", "USD", "JPY", "GBP", "CHF", "AUD", "CAD", "NZD"],
                  "isTransparent": false,
                  "colorTheme": "dark",
                  "locale": "es"
                }
                </script>
            </div>
        </div>

        <div class="grid-main">
            <!-- 2. CALENDARIO DE ALTO IMPACTO -->
            <div class="box">
                <h2>Calendario Económico (Alto Impacto)</h2>
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                    {
                      "colorTheme": "dark",
                      "isMaximized": true,
                      "width": "100%",
                      "height": "650",
                      "locale": "es",
                      "importanceFilter": "1",
                      "currencyFilter": "USD,EUR,JPY,GBP,AUD,CAD,CHF,NZD"
                    }
                    </script>
                </div>
            </div>

            <!-- 3. DATOS MACRO POR PAÍS (INCLUYE CHF, AUD, NZD) -->
            <div class="box">
                <h2>Bancos Centrales e Indicadores</h2>
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
                    {
                      "width": "100%",
                      "height": "650",
                      "symbolsGroups": [
                        {
                          "name": "Tasas de Interés (Bancos Centrales)",
                          "symbols": [
                            { "name": "ECONOMICS:USINTR", "displayName": "FED (USA)" },
                            { "name": "ECONOMICS:EUINTR", "displayName": "BCE (Euro)" },
                            { "name": "ECONOMICS:JPINTR", "displayName": "BoJ (Japón)" },
                            { "name": "ECONOMICS:CHINTR", "displayName": "SNB (Suiza)" },
                            { "name": "ECONOMICS:AUINTR", "displayName": "RBA (Australia)" },
                            { "name": "ECONOMICS:NZINTR", "displayName": "RBNZ (N. Zelanda)" },
                            { "name": "ECONOMICS:GBINTR", "displayName": "BoE (R. Unido)" }
                          ]
                        },
                        {
                          "name": "Otros Datos Clave",
                          "symbols": [
                            { "name": "ECONOMICS:USIRATE", "displayName": "Inflación USA" },
                            { "name": "TVC:US10Y", "displayName": "Bono 10Y USA" },
                            { "name": "ECONOMICS:USUEP", "displayName": "Desempleo USA" },
                            { "name": "ECONOMICS:CNGDP", "displayName": "PIB China" }
                          ]
                        }
                      ],
                      "showSymbolLogo": true,
                      "colorTheme": "dark",
                      "locale": "es"
                    }
                    </script>
                </div>
            </div>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro Terminal Pro - High Volume</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0d1117; color: white; margin: 0; padding: 15px; }
        .container { max-width: 1600px; margin: 0 auto; }
        .top-row { display: grid; grid-template-columns: 1fr 400px; gap: 15px; margin-bottom: 15px; }
        .box { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 15px; }
        .full-width-row { width: 100%; margin-top: 15px; }
        h2 { color: #58a6ff; font-size: 13px; text-transform: uppercase; margin-top: 0; border-bottom: 1px solid #30363d; padding-bottom: 8px; margin-bottom: 12px; letter-spacing: 1px; }
        h1 { font-size: 24px; font-weight: 300; text-align: center; margin-bottom: 20px; color: #f0f6fc; }
    </style>
</head>
<body>

    <h1>TERMINAL MACRO GLOBAL COMPLETA</h1>

    <div class="container">
        
        <!-- FILA SUPERIOR: SENTIMIENTO Y CALENDARIO -->
        <div class="top-row">
            <!-- MAPA DE CALOR (SENTIMIENTO) -->
            <div class="box">
                <h2>Fortaleza de Divisas (Risk On/Off)</h2>
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-forex-heat-map.js" async>
                    {
                      "width": "100%",
                      "height": "400",
                      "currencies": ["EUR", "USD", "JPY", "GBP", "CHF", "AUD", "CAD", "NZD"],
                      "colorTheme": "dark",
                      "locale": "es"
                    }
                    </script>
                </div>
            </div>

            <!-- CALENDARIO (ALTO IMPACTO) -->
            <div class="box">
                <h2>Noticias / NFP / Tasas</h2>
                <div class="tradingview-widget-container">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                    {
                      "colorTheme": "dark",
                      "width": "100%",
                      "height": "400",
                      "locale": "es",
                      "importanceFilter": "1",
                      "currencyFilter": "USD,EUR,JPY,GBP,AUD,CAD,CHF,NZD"
                    }
                    </script>
                </div>
            </div>
        </div>

        <!-- FILA INFERIOR: DASHBOARD AGRANDADO DE DATOS MACRO -->
        <div class="box full-width-row">
            <h2>Dashboard de Indicadores Económicos (PIB, Desempleo, PMI, NFP)</h2>
            <div class="tradingview-widget-container">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-quotes.js" async>
                {
                  "width": "100%",
                  "height": "900",
                  "symbolsGroups": [
                    {
                      "name": "TASAS Y EMPLEO (NFP)",
                      "symbols": [
                        { "name": "ECONOMICS:USINTR", "displayName": "FED USA (%)" },
                        { "name": "ECONOMICS:USNFP", "displayName": "NFP USA (Nóminas)" },
                        { "name": "ECONOMICS:USUEP", "displayName": "Desempleo USA" },
                        { "name": "ECONOMICS:EUUEP", "displayName": "Desempleo EUR" },
                        { "name": "ECONOMICS:GBUEP", "displayName": "Desempleo UK" },
                        { "name": "ECONOMICS:AUUEP", "displayName": "Desempleo AUS" },
                        { "name": "ECONOMICS:JPUEP", "displayName": "Desempleo JPN" }
                      ]
                    },
                    {
                      "name": "CRECIMIENTO (PIB ANUAL)",
                      "symbols": [
                        { "name": "ECONOMICS:USGDP", "displayName": "PIB USA" },
                        { "name": "ECONOMICS:EUGDP", "displayName": "PIB EUR" },
                        { "name": "ECONOMICS:GBGDP", "displayName": "PIB UK" },
                        { "name": "ECONOMICS:JPGDP", "displayName": "PIB JPN" },
                        { "name": "ECONOMICS:CHGDP", "displayName": "PIB SUI" },
                        { "name": "ECONOMICS:AUGDP", "displayName": "PIB AUS" },
                        { "name": "ECONOMICS:NZGDP", "displayName": "PIB NZD" },
                        { "name": "ECONOMICS:CNGDP", "displayName": "PIB CHN" }
                      ]
                    },
                    {
                      "name": "PMI Y ACTIVIDAD",
                      "symbols": [
                        { "name": "ECONOMICS:USPMI", "displayName": "PMI Manuf. USA" },
                        { "name": "ECONOMICS:USISMPMI", "displayName": "ISM Serv. USA" },
                        { "name": "ECONOMICS:EUPMI", "displayName": "PMI Manuf. EUR" },
                        { "name": "ECONOMICS:GBPMI", "displayName": "PMI Manuf. UK" },
                        { "name": "ECONOMICS:JPPMI", "displayName": "PMI Manuf. JPN" }
                      ]
                    }
                  ],
                  "showSymbolLogo": true,
                  "colorTheme": "dark",
                  "locale": "es"
                }
                </script>
            </div>
        </div>

    </div>

</body>
</html>
